<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gold City Developments presents Seven B Mall, a premium medical investment destination with clinics, labs, reservation support, and direct WhatsApp inquiry." />
    <title>Gold City Developments | Seven B Mall</title>
    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(201, 169, 110, 0.18), transparent 42%),
          linear-gradient(180deg, #111111 0%, #1b1b1b 100%);
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }

      #app-preloader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .preloader-mark {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        text-align: center;
        color: #f5e7c2;
      }

      .preloader-logo-shell {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 18px;
        border: 1px solid rgba(241, 210, 138, 0.16);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
      }

      .preloader-logo {
        width: min(300px, 58vw);
        height: auto;
        display: block;
      }

      .preloader-ring {
        width: 48px;
        height: 48px;
        border: 1px solid rgba(241, 210, 138, 0.22);
        border-top-color: #f1d28a;
        border-radius: 999px;
        animation: preloader-spin 0.7s linear infinite;
      }

      .preloader-subtitle {
        font-family: "Manrope", sans-serif;
        font-size: 0.56rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
      }

      @keyframes preloader-spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      (function () {
        try {
          var redirect = sessionStorage.getItem("gh-pages-spa-redirect");
          if (!redirect) return;

          sessionStorage.removeItem("gh-pages-spa-redirect");

          var url = new URL(redirect, window.location.origin);
          var nextPath = url.pathname + url.search + url.hash;
          var currentPath =
            window.location.pathname + window.location.search + window.location.hash;

          if (nextPath !== currentPath) {
            window.history.replaceState(null, "", nextPath);
          }
        } catch (error) {
          console.warn("GitHub Pages redirect recovery failed", error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app-preloader" aria-hidden="true">
      <div class="preloader-mark">
        <div class="preloader-logo-shell">
          <img class="preloader-logo" src="images/GOLD CITY.jpg" alt="Gold City Developments" />
        </div>
        <div class="preloader-ring"></div>
        <div class="preloader-subtitle">Premium Commercial Destinations</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
