<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Gold City Developments presents Seven B Mall, a premium medical investment destination with clinics, labs, reservation support, and direct WhatsApp inquiry." />
    <link rel="icon" type="image/png" href="images/ChatGPT%20Image%20Apr%2025,%202026,%2002_33_44%20PM.png" />
    <title>Gold City Developments | Seven B Mall</title>
    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(17, 17, 17, 0.18);
        backdrop-filter: blur(4px);
        transition: opacity 0.22s ease, visibility 0.22s ease;
      }

      #app-preloader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .preloader-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 20px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 18px 42px rgba(17, 17, 17, 0.14);
      }

      .preloader-brand img {
        height: 34px;
        width: auto;
        object-fit: contain;
      }

      .preloader-text {
        display: flex;
        flex-direction: column;
        line-height: 1;
      }

      .preloader-text .main {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 1px;
        color: #1a1a1a;
      }

      .preloader-text .sub {
        margin-top: 2px;
        font-size: 9px;
        letter-spacing: 4px;
        color: #999999;
        text-transform: uppercase;
      }
    </style>
    <script>
      (function () {
        try {
          var redirect = sessionStorage.getItem("gh-pages-spa-redirect");
          if (!redirect) return;

          sessionStorage.removeItem("gh-pages-spa-redirect");

          var url = new URL(redirect, window.location.origin);
          var nextPath = url.pathname + url.search + url.hash;
          var currentPath =
            window.location.pathname + window.location.search + window.location.hash;

          if (nextPath !== currentPath) {
            window.history.replaceState(null, "", nextPath);
          }
        } catch (error) {
          console.warn("GitHub Pages redirect recovery failed", error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app-preloader" aria-hidden="true">
      <div class="preloader-brand">
        <img src="images/ChatGPT%20Image%20Apr%2025,%202026,%2002_33_44%20PM.png" alt="Gold City Developments" />
        <div class="preloader-text">
          <span class="main">GOLD CITY</span>
          <span class="sub">DEVELOPMENTS</span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
