name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_APP_BASE: /Luxurymultipagecompanywebsite/
          VITE_EMAILJS_SERVICE_ID: service_c1m9x7s
          VITE_EMAILJS_TEMPLATE_ID: template_tx75pxf
          VITE_EMAILJS_PUBLIC_KEY: kBKCoTMPgVC9bCLo8
          VITE_LEAD_TO_EMAIL: info@goldcitydevelopments.com
        run: npm run build

      - name: Add SPA fallback
        run: cp public/404.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
